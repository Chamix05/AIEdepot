  <!-- Bootstrap JS -->
  <script src="{{url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

  <script src="{{url_for('static', filename='js/menu.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard_notif.js') }}"></script>

  <script>

    document.getElementById("uploadForm").addEventListener("submit", function (e) {
      e.preventDefault();
      let formData = new FormData(document.getElementById("uploadForm"));

      fetch("/upload", { method: "POST", body: formData })
        .then(async response => {
          const contentType = response.headers.get("content-type") || "";

          if (contentType.includes("application/json")) {
            // Cas erreur
            let data = await response.json();
            const notifContainer = document.getElementById("notificationContainer");
            const notifMessage = notifContainer.querySelector(".notification-message");
            const icon = document.getElementById("notificationIcon");

            notifMessage.textContent = data.notif_message;
            icon.className = "notification-icon bi bi-exclamation-circle text-danger";
            console.log("Notification affichée:", data.notif_message, "Type:", data.notif_type); // DEBUG

            notifContainer.classList.add("show");
            setTimeout(() => {
              notifContainer.classList.remove("show");
            }, 4000);
          } else {
            // Cas succès
            let html = await response.text();
            const resultBox = document.getElementById("resultBox");
            resultBox.innerHTML = html;
            resultBox.classList.add("show"); //  rend visible

          }
        })
        .catch(err => {
          console.error("Erreur fetch:", err);
        });
    });


    /*document.getElementById("uploadForm").addEventListener("submit", function () {
      document.getElementById("loadingSpinner").style.display = "block";
    });*/



  </script>
