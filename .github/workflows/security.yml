name: Security CI 

on: [push, pull_request]

jobs:

  #  SAST 
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install flake8 bandit

      - name: Run flake8 
        run: flake8 src

      - name: Run bandit 
        run: bandit -r src

  # DAST
  dast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start application 
        run: |
          pip install flask
          pip install mysql-connector-python
          pip install passlib
          pip install scikit-learn
          pip install nltk
          pip install pandas
          pip install -e .
          nohup python src/app.py &

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'

  # SCA
  sca:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit 
        run: pip-audit