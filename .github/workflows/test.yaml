name: Python CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
      
    - name: Install dependencies
      run: |
        pip install flask
        pip install pytest
        pip install mysql-connector-python
        pip install passlib
        pip install scikit-learn
        pip install nltk
        pip install pandas
        pip install -e .

    - name: Download NLTK data
      run: |
        python - <<EOF
import nltk
nltk.download('stopwords')
EOF

    - name: Run tests
      run: PYTHONPATH=src pytest -v